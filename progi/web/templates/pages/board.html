{% extends base_template %}

{% block content %}
{# ── Kanban board ─────────────────────────────────────────────────────────── #}
<div x-cloak x-data="boardView()" x-init="init()">
<section x-data="{ refreshed: false, search: '', workflowId: '', status: '', _timer: null, triggerRefresh() { clearTimeout(this._timer); this._timer = setTimeout(() => { const params = new URLSearchParams(); if (this.search) params.set('q', this.search); if (this.workflowId) params.set('workflow_id', this.workflowId); if (this.status) params.set('status', this.status); $ajax('/board?' + params.toString(), { target: 'board' }); }, 220) } }">
  <div class="flex items-center gap-2 mb-3">
    <input
      type="search"
      placeholder="Search tasks…"
      x-model="search"
      @input="triggerRefresh()"
      class="flex-1 px-3 py-1.5 rounded-lg text-xs text-primary placeholder:text-ghost
        bg-surface-2 border border-subtle focus:border-subtle-hover focus:outline-none
        transition-colors duration-150"
    />
    <div class="relative">
      <select
        x-model="workflowId"
        @change="triggerRefresh()"
        class="appearance-none py-1.5 pl-2.5 pr-7 rounded-lg text-xs text-secondary
          bg-surface-2 border border-subtle hover:border-subtle-hover
          focus:border-subtle-hover focus:outline-none
          transition-colors duration-150 cursor-pointer"
      >
        <option value="">All workflows</option>
        {% for wf in workflows %}
        <option value="{{ wf.id }}">{{ wf.name }}</option>
        {% endfor %}
      </select>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"
        class="absolute right-1.5 top-1/2 -translate-y-1/2 size-3.5 text-muted pointer-events-none">
        <path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
      </svg>
    </div>
    <div class="relative">
      <select
        x-model="status"
        @change="triggerRefresh()"
        class="appearance-none py-1.5 pl-2.5 pr-7 rounded-lg text-xs text-secondary
          bg-surface-2 border border-subtle hover:border-subtle-hover
          focus:border-subtle-hover focus:outline-none
          transition-colors duration-150 cursor-pointer"
      >
        <option value="">All statuses</option>
        <option value="todo">To do</option>
        <option value="in_progress">In progress</option>
        <option value="done">Done</option>
      </select>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"
        class="absolute right-1.5 top-1/2 -translate-y-1/2 size-3.5 text-muted pointer-events-none">
        <path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
      </svg>
    </div>
    <a
      href="/board"
      x-target="board"
      @ajax:before="search = ''; workflowId = ''; status = ''"
      @ajax:success="refreshed = true; setTimeout(() => refreshed = false, 1500)"
      class="inline-flex items-center gap-1.5 rounded-lg px-3 py-1.5
        text-xs font-medium text-faint hover:text-primary
        bg-surface-2 hover:bg-surface-3 border border-subtle hover:border-subtle-hover
        transition-colors duration-150"
      title="Refresh board"
    >
      <svg x-show="!refreshed" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-3.5">
        <path fill-rule="evenodd" d="M15.312 11.424a5.5 5.5 0 0 1-9.201 2.466l-.312-.311h2.433a.75.75 0 0 0 0-1.5H3.989a.75.75 0 0 0-.75.75v4.242a.75.75 0 0 0 1.5 0v-2.43l.31.31a7 7 0 0 0 11.712-3.138.75.75 0 0 0-1.449-.39Zm1.23-3.723a.75.75 0 0 0 .219-.53V2.929a.75.75 0 0 0-1.5 0V5.36l-.31-.31A7 7 0 0 0 3.239 8.188a.75.75 0 1 0 1.448.389A5.5 5.5 0 0 1 13.89 6.11l.311.31h-2.432a.75.75 0 0 0 0 1.5h4.243a.75.75 0 0 0 .53-.219Z" clip-rule="evenodd" />
      </svg>
      <svg x-show="refreshed" xmlns="http://www.w3.org/2000/svg" class="size-3.5 text-green-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      Refresh
    </a>
  </div>
  {% include "partials/board.html" %}
</section>

{# ── Task detail modal ──────────────────────────────────────────────────── #}
<template x-if="modalOpen">
  <div
    class="fixed inset-0 z-50 flex items-center justify-center p-6"
    role="dialog"
    aria-modal="true"
    aria-labelledby="task-detail-title"
    x-trap.inert.noscroll="modalOpen"
    @keydown.escape.window="closeModal()"
    @close-modal.window="closeModal()"
    @click.self="closeModal()"
  >
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="closeModal()"></div>
    <article
      class="relative z-10 w-full max-w-2xl max-h-[80vh] flex flex-col bg-surface-2 border border-subtle rounded-xl shadow-2xl overflow-hidden"
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0 scale-95"
      x-transition:enter-end="opacity-100 scale-100"
      x-transition:leave="transition ease-in duration-150"
      x-transition:leave-start="opacity-100 scale-100"
      x-transition:leave-end="opacity-0 scale-95"
    >
      <div id="task-detail" class="flex flex-col min-h-0 flex-1"></div>
    </article>
  </div>
</template>
</div>
{% endblock %}
